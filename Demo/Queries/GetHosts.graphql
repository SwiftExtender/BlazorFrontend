query GetHosts {
    hosts {
      id,
      ip,
      info,
      subnetId,
      ports {
        id,
        number,
        info,
        protocol,
        banner,
        vhosts {
          id,
          name
        }
      },
      subnet {
        id,
        cidr,
        name,
        description
      }
      domains {
        name
      }
    }
}