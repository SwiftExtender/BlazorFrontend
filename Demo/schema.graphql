schema {
  query: Query
}

input UrlsFilterInput {
  and: [UrlsFilterInput!]
  or: [UrlsFilterInput!]
  id: IdOperationFilterInput
  name: StringOperationFilterInput
  vhostId: IntOperationFilterInput
  info: StringOperationFilterInput
  requests: ListFilterInputTypeOfRequestFilterInput
  screenshot: ListByteOperationFilterInput
  vhost: VhostFilterInput
}

input IdOperationFilterInput {
  eq: ID
  neq: ID
  in: [ID]
  nin: [ID]
}

type Scan {
  id: Int!
  startTime: DateTime!
  endTime: DateTime
  status: String
  stdout: String
  stderr: String
  description: String
  agentId: Int
  toolId: Int
  agent: Agent
  tool: Tool
}

input PortSortInput {
  id: SortEnumType
  number: SortEnumType
  hostId: SortEnumType
  info: SortEnumType
  protocol: SortEnumType
  banner: SortEnumType
  host: HostsSortInput
}

input ParamSortInput {
  id: SortEnumType
  name: SortEnumType
  value: SortEnumType
  vhostId: SortEnumType
  vhost: VhostSortInput
}

type Urls {
  id: ID!
  name: String!
  vhostId: Int!
  info: String
  requests: [Request!]!
  screenshot: [Byte!]!
  vhost: Vhost!
}

input SubnetFilterInput {
  and: [SubnetFilterInput!]
  or: [SubnetFilterInput!]
  id: IdOperationFilterInput
  cidr: StringOperationFilterInput
  name: StringOperationFilterInput
  description: StringOperationFilterInput
  hosts: ListFilterInputTypeOfHostsFilterInput
}

input ByteOperationFilterInput {
  eq: Byte
  neq: Byte
  in: [Byte]
  nin: [Byte]
  gt: Byte
  ngt: Byte
  gte: Byte
  ngte: Byte
  lt: Byte
  nlt: Byte
  lte: Byte
  nlte: Byte
}

input AgentFilterInput {
  and: [AgentFilterInput!]
  or: [AgentFilterInput!]
  id: IntOperationFilterInput
  name: StringOperationFilterInput
  description: StringOperationFilterInput
  url: StringOperationFilterInput
  token: StringOperationFilterInput
  status: StringOperationFilterInput
  scans: ListFilterInputTypeOfScanFilterInput
}

type Port {
  id: ID!
  number: Int!
  hostId: Int!
  info: String
  protocol: String!
  banner: String
  host: Hosts
  vhosts: [Vhost!]!
}

input RequestSortInput {
  id: SortEnumType
  urlId: SortEnumType
  createdAt: SortEnumType
  method: SortEnumType
  status: SortEnumType
  response: SortEnumType
  info: SortEnumType
  rawRequest: SortEnumType
  url: UrlsSortInput
}

input ExtractorSortInput {
  id: SortEnumType
  name: SortEnumType
  description: SortEnumType
  code: SortEnumType
}

input ListByteOperationFilterInput {
  all: ByteOperationFilterInput
  none: ByteOperationFilterInput
  some: ByteOperationFilterInput
  any: Boolean
}

input PortFilterInput {
  and: [PortFilterInput!]
  or: [PortFilterInput!]
  id: IdOperationFilterInput
  number: IntOperationFilterInput
  hostId: IntOperationFilterInput
  info: StringOperationFilterInput
  protocol: StringOperationFilterInput
  banner: StringOperationFilterInput
  host: HostsFilterInput
  vhosts: ListFilterInputTypeOfVhostFilterInput
}

type Agent {
  id: Int!
  name: String!
  description: String
  url: String!
  token: String!
  status: String!
  scans: [Scan!]!
}

enum SortEnumType {
  ASC
  DESC
}

input ListFilterInputTypeOfRequestFilterInput {
  all: RequestFilterInput
  none: RequestFilterInput
  some: RequestFilterInput
  any: Boolean
}

input ExtractorFilterInput {
  and: [ExtractorFilterInput!]
  or: [ExtractorFilterInput!]
  id: IntOperationFilterInput
  name: StringOperationFilterInput
  description: StringOperationFilterInput
  code: StringOperationFilterInput
}

input RequestFilterInput {
  and: [RequestFilterInput!]
  or: [RequestFilterInput!]
  id: IdOperationFilterInput
  urlId: IntOperationFilterInput
  createdAt: DateTimeOperationFilterInput
  method: StringOperationFilterInput
  status: IntOperationFilterInput
  response: StringOperationFilterInput
  info: StringOperationFilterInput
  rawRequest: StringOperationFilterInput
  url: UrlsFilterInput
}

input ListFilterInputTypeOfPortFilterInput {
  all: PortFilterInput
  none: PortFilterInput
  some: PortFilterInput
  any: Boolean
}

type Subnet {
  id: ID!
  cidr: String!
  name: String
  description: String
  hosts: [Hosts!]!
}

input VhostSortInput {
  id: SortEnumType
  name: SortEnumType
  info: SortEnumType
}

input ListFilterInputTypeOfParamFilterInput {
  all: ParamFilterInput
  none: ParamFilterInput
  some: ParamFilterInput
  any: Boolean
}

input StringOperationFilterInput {
  and: [StringOperationFilterInput!]
  or: [StringOperationFilterInput!]
  eq: String
  neq: String
  contains: String
  ncontains: String
  in: [String]
  nin: [String]
  startsWith: String
  nstartsWith: String
  endsWith: String
  nendsWith: String
}

input UrlsSortInput {
  id: SortEnumType
  name: SortEnumType
  vhostId: SortEnumType
  info: SortEnumType
  vhost: VhostSortInput
}

input ScanSortInput {
  id: SortEnumType
  startTime: SortEnumType
  endTime: SortEnumType
  status: SortEnumType
  stdout: SortEnumType
  stderr: SortEnumType
  description: SortEnumType
  agentId: SortEnumType
  toolId: SortEnumType
  agent: AgentSortInput
  tool: ToolSortInput
}

input ParamFilterInput {
  and: [ParamFilterInput!]
  or: [ParamFilterInput!]
  id: IdOperationFilterInput
  name: StringOperationFilterInput
  value: StringOperationFilterInput
  vhostId: IntOperationFilterInput
  vhost: VhostFilterInput
}

input DomainSortInput {
  id: SortEnumType
  name: SortEnumType
  info: SortEnumType
}

input ListFilterInputTypeOfDomainFilterInput {
  all: DomainFilterInput
  none: DomainFilterInput
  some: DomainFilterInput
  any: Boolean
}

type Query {
  subnets(where: SubnetFilterInput order: [SubnetSortInput!]): [Subnet!]!
  hosts(where: HostsFilterInput order: [HostsSortInput!]): [Hosts!]!
  ports(where: PortFilterInput order: [PortSortInput!]): [Port!]!
  domains(where: DomainFilterInput order: [DomainSortInput!]): [Domain!]!
  keywords(where: KeywordFilterInput order: [KeywordSortInput!]): [Keyword!]!
  requests(where: RequestFilterInput order: [RequestSortInput!]): [Request!]!
  extractors(where: ExtractorFilterInput order: [ExtractorSortInput!]): [Extractor!]!
  tools(where: ToolFilterInput order: [ToolSortInput!]): [Tool!]!
  urls(where: UrlsFilterInput order: [UrlsSortInput!]): [Urls!]!
  vhosts(where: VhostFilterInput order: [VhostSortInput!]): [Vhost!]!
  scans(where: ScanFilterInput order: [ScanSortInput!]): [Scan!]!
  params(where: ParamFilterInput order: [ParamSortInput!]): [Param!]!
}

input IntOperationFilterInput {
  eq: Int
  neq: Int
  in: [Int]
  nin: [Int]
  gt: Int
  ngt: Int
  gte: Int
  ngte: Int
  lt: Int
  nlt: Int
  lte: Int
  nlte: Int
}

input ListFilterInputTypeOfScanFilterInput {
  all: ScanFilterInput
  none: ScanFilterInput
  some: ScanFilterInput
  any: Boolean
}

type Keyword {
  id: ID!
  name: String!
