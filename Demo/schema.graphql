  domains: [Domain!]!
}

type Param {
  id: ID!
  name: String!
  value: String
  vhostId: Int!
  vhost: Vhost!
}

input AgentSortInput {
  id: SortEnumType
  name: SortEnumType
  description: SortEnumType
  url: SortEnumType
  token: SortEnumType
  status: SortEnumType
}

type Tool {
  id: Int!
  name: String!
  description: String
  command: String!
  scans: [Scan!]!
}

input DateTimeOperationFilterInput {
  eq: DateTime
  neq: DateTime
  in: [DateTime]
  nin: [DateTime]
  gt: DateTime
  ngt: DateTime
  gte: DateTime
  ngte: DateTime
  lt: DateTime
  nlt: DateTime
  lte: DateTime
  nlte: DateTime
}

type Domain {
  id: ID!
