}

input HostsFilterInput {
  and: [HostsFilterInput!]
  or: [HostsFilterInput!]
  id: IdOperationFilterInput
  ip: StringOperationFilterInput
  info: StringOperationFilterInput
  subnetId: IntOperationFilterInput
  ports: ListFilterInputTypeOfPortFilterInput
  subnet: SubnetFilterInput
