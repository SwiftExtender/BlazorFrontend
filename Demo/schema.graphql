}

input SubnetSortInput {
  id: SortEnumType
  cidr: SortEnumType
  name: SortEnumType
  description: SortEnumType
}

"The `Byte` scalar type represents non-fractional whole numeric values. Byte can represent values between 0 and 255."
scalar Byte

input ToolSortInput {
  id: SortEnumType
  name: SortEnumType
  description: SortEnumType
  command: SortEnumType
}

type Vhost {
  id: ID!
  name: String!
  info: String
  params: [Param!]!
  urls: [Urls!]!
  ports: [Port!]!
}

type Extractor {
  id: Int!
  name: String!
  description: String
  code: String
}

input KeywordSortInput {
  id: SortEnumType
  name: SortEnumType
  source: SortEnumType
  info: SortEnumType
}

type Hosts {
