}

input ListFilterInputTypeOfUrlsFilterInput {
  all: UrlsFilterInput
  none: UrlsFilterInput
  some: UrlsFilterInput
  any: Boolean
}

input DomainFilterInput {
  and: [DomainFilterInput!]
  or: [DomainFilterInput!]
  id: IdOperationFilterInput
  name: StringOperationFilterInput
  info: StringOperationFilterInput
  hosts: ListFilterInputTypeOfHostsFilterInput
}

input VhostFilterInput {
  and: [VhostFilterInput!]
  or: [VhostFilterInput!]
